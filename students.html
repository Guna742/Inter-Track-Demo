<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternTrack — Students</title>
    <meta name="description"
        content="InternTrack students overview: view intern profiles, scores, and project contributions.">
    <link rel="stylesheet" href="css/students.css">
</head>

<body>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app-shell">

        <!-- ── Sidebar ── -->
        <aside class="app-sidebar" id="app-sidebar" role="navigation" aria-label="Main navigation">
            <div class="sidebar-brand">
                <div class="sidebar-logo" aria-hidden="true">🎯</div>
                <span class="sidebar-title">InternTrack</span>
            </div>

            <nav class="sidebar-nav" id="sidebar-nav" aria-label="Page navigation">
                <!-- Injected by JS -->
            </nav>

            <div class="sidebar-footer">
                <div class="user-info" id="user-info-sidebar" role="button" aria-label="User info and logout"
                    tabindex="0">
                    <div class="user-avatar" id="user-avatar-sidebar" aria-hidden="true">A</div>
                    <div class="user-meta">
                        <div class="user-name" id="user-name-sidebar">Loading...</div>
                        <div class="user-role" id="user-role-sidebar">—</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ── Topbar ── -->
        <header class="app-topbar" role="banner">
            <div class="container flex-between" style="height:100%">
                <div class="topbar-left">
                    <button id="hamburger-btn" aria-label="Toggle sidebar" aria-expanded="false">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" aria-hidden="true">
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg>
                    </button>
                    <span class="topbar-title" id="topbar-title">Students</span>
                </div>
                <div class="topbar-right">
                    <span class="badge badge-admin" id="topbar-role-badge">Admin</span>
                    <button class="btn btn-secondary btn-sm" id="logout-btn" aria-label="Sign out">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" aria-hidden="true">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg>
                        Sign Out
                    </button>
                </div>
            </div>
        </header>

        <!-- ── Main Content ── -->
        <main class="app-content" id="app-content" aria-label="Students content">
            <div class="container">

                <!-- Role banner -->
                <div class="role-banner" id="role-banner">
                    <span class="role-banner-icon" aria-hidden="true">🎓</span>
                    <div class="role-banner-text">
                        <div class="role-banner-title" id="welcome-title">Students Overview</div>
                        <div class="role-banner-sub" id="welcome-sub">Review intern profiles, progress, and project
                            contributions.</div>
                    </div>
                    <span class="badge badge-admin" id="role-badge-main">Admin</span>
                </div>

                <!-- Students Header -->
                <div class="students-header">
                    <h1>🎓 Interns</h1>
                    <span class="students-count" id="students-count">0 interns</span>
                </div>

                <!-- Students List -->
                <div class="students-list" id="students-container" aria-label="Student list">
                    <!-- Injected by JS -->
                </div>

            </div>
        </main>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/admin-popup.js"></script>
    <script src="js/students.js"></script>
</body>

</html>
